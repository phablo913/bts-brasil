<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novas Datas — BTS WORLD TOUR 'ARIRANG' 💜</title>
  <meta name="description" content="Abaixo-assinado de fãs por novas datas da BTS WORLD TOUR 'ARIRANG' no Brasil.">  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      onSnapshot,
      deleteDoc,
      doc,
      query,
      where,
      getDocs,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAorOEChpWGRIXU2cP7f9TmqHbep7H660Y",
      authDomain: "bts-brasil-b068f.firebaseapp.com",
      projectId: "bts-brasil-b068f",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const META = 1000000;
    let adminUnsubscribe = null;
    let cidadesDoEstado = [];
    const CACHE_CIDADES_PREFIXO = "municipios_uf_";

    const ESTADOS = [
      "AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS",
      "MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"
    ];

    async function prepararAuth() {
      try {
        await setPersistence(auth, browserSessionPersistence);
      } catch (error) {
        console.error(error);
      }
    }

    function popularEstados() {
      const select = document.getElementById("estado");
      select.innerHTML = '<option value="">Selecione o estado</option>';
      ESTADOS.forEach(uf => {
        const option = document.createElement("option");
        option.value = uf;
        option.textContent = uf;
        select.appendChild(option);
      });
    }

    function validarNomeCompleto(nome) {
      return /^\s*[^\s]+(?:\s+[^\s]+)+\s*$/.test(nome);
    }

    async function gerarFingerprint() {
      const raw = [
        navigator.userAgent,
        navigator.language,
        navigator.platform,
        screen.width,
        screen.height,
        screen.colorDepth,
        Intl.DateTimeFormat().resolvedOptions().timeZone,
        navigator.hardwareConcurrency || "",
        navigator.maxTouchPoints || ""
      ].join("|");

      const bytes = new TextEncoder().encode(raw);
      const hash = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function abrirModal(id) {
      document.getElementById(id).style.display = "flex";
    }

    function fecharModal(id) {
      document.getElementById(id).style.display = "none";
    }

    function ativarModoCelebracao() {
      document.body.classList.add("signature-wave");
      document.body.classList.add("signature-flash");
      setTimeout(() => document.body.classList.remove("signature-flash"), 900);
      setTimeout(() => document.body.classList.remove("signature-wave"), 3200);
    }

    function criarEfeitoAssinatura() {
      const container = document.getElementById("celebration");
      container.innerHTML = "";
      const symbols = ["💜", "✨", "💫", "💜", "✦", "✧"];

      for (let i = 0; i < 28; i++) {
        const el = document.createElement("div");
        el.className = "burst-item";
        el.textContent = symbols[i % symbols.length];
        el.style.left = Math.random() * 100 + "%";
        el.style.animationDelay = (Math.random() * 0.35) + "s";
        el.style.fontSize = (16 + Math.random() * 20) + "px";
        el.style.animationDuration = (1.4 + Math.random() * 0.8) + "s";
        container.appendChild(el);
      }

      container.classList.add("show-burst");
      ativarModoCelebracao();

      setTimeout(() => {
        container.classList.remove("show-burst");
        container.innerHTML = "";
      }, 2800);
    }

    async function carregarCidadesPorEstado(uf) {
      const cidadeInput = document.getElementById("cidade");
      const sugestoesBox = document.getElementById("cidadeSugestoes");

      cidadeInput.value = "";
      cidadeInput.disabled = true;
      cidadeInput.placeholder = uf ? "Carregando cidades..." : "Selecione primeiro o estado";
      sugestoesBox.innerHTML = "";
      sugestoesBox.style.display = "none";
      cidadesDoEstado = [];

      if (!uf) return;

      try {
        const chaveCache = `${CACHE_CIDADES_PREFIXO}${uf}`;
        const cacheBruto = sessionStorage.getItem(chaveCache);

        if (cacheBruto) {
          cidadesDoEstado = JSON.parse(cacheBruto);
          cidadeInput.disabled = false;
          cidadeInput.placeholder = "Selecione ou pesquise sua cidade";
          renderizarSugestoes(cidadesDoEstado);
          return;
        }

        const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
        const cidades = await response.json();
        cidadesDoEstado = cidades.map(cidade => cidade.nome);
        sessionStorage.setItem(chaveCache, JSON.stringify(cidadesDoEstado));

        cidadeInput.disabled = false;
        cidadeInput.placeholder = "Selecione ou pesquise sua cidade";
        renderizarSugestoes(cidadesDoEstado);
      } catch (error) {
        console.error(error);
        cidadeInput.placeholder = "Não foi possível carregar as cidades";
      }
    }

    function renderizarSugestoes(lista) {
      const sugestoesBox = document.getElementById("cidadeSugestoes");
      sugestoesBox.innerHTML = "";

      if (!lista.length) {
        sugestoesBox.innerHTML = '<div class="cidade-vazia">Nenhuma cidade encontrada</div>';
        sugestoesBox.style.display = "block";
        return;
      }

      lista.forEach(nomeCidade => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "cidade-opcao";
        item.textContent = nomeCidade;
        item.addEventListener("click", () => selecionarCidade(nomeCidade));
        sugestoesBox.appendChild(item);
      });

      sugestoesBox.style.display = "block";
    }

    function selecionarCidade(nomeCidade) {
      document.getElementById("cidade").value = nomeCidade;
      document.getElementById("cidadeSugestoes").style.display = "none";
    }

    function filtrarCidades(valor) {
      const termo = valor.trim().toLowerCase();
      if (!termo) {
        renderizarSugestoes(cidadesDoEstado);
        return;
      }

      const cidadesFiltradas = cidadesDoEstado
        .filter(cidade => cidade.toLowerCase().includes(termo));

      renderizarSugestoes(cidadesFiltradas);
    }

    function mostrarSugestoesSePossivel() {
      if (!cidadesDoEstado.length) return;
      const valor = document.getElementById("cidade").value.trim();
      if (!valor) {
        renderizarSugestoes(cidadesDoEstado);
      } else {
        filtrarCidades(valor);
      }
    }

    function esconderSugestoesComDelay() {
      setTimeout(() => {
        document.getElementById("cidadeSugestoes").style.display = "none";
      }, 120);
    }

    function abrirAdminMenu() {
      document.getElementById("adminMenuPanel").classList.add("open");
      document.getElementById("adminBackdrop").classList.add("show");
    }

    function fecharAdminMenu() {
      document.getElementById("adminMenuPanel").classList.remove("open");
      document.getElementById("adminBackdrop").classList.remove("show");
    }

    function mostrarAdminAba(aba) {
      document.querySelectorAll(".admin-tab-content").forEach(el => el.style.display = "none");
      document.querySelectorAll(".admin-nav button").forEach(btn => btn.classList.remove("active"));
      const alvo = document.getElementById(aba);
      if (alvo) alvo.style.display = "block";
      const botao = document.querySelector(`[data-admin-tab="${aba}"]`);
      if (botao) botao.classList.add("active");
    }

    function renderizarRankingEstados(registros) {
      const totais = {};
      ESTADOS.forEach(uf => totais[uf] = 0);

      registros.forEach(registro => {
        const uf = (registro.estado || "").toUpperCase();
        if (totais[uf] !== undefined) totais[uf] += 1;
      });

      const ranking = Object.entries(totais)
        .filter(([, total]) => total > 0)
        .sort((a, b) => b[1] - a[1]);

      const rankingLista = document.getElementById("rankingLista");
      const rankingGrafico = document.getElementById("rankingGrafico");
      const topEstado = document.getElementById("topEstado");
      const totalEstados = document.getElementById("totalEstados");
      const totalAssinaturasAdmin = document.getElementById("totalAssinaturasAdmin");

      rankingLista.innerHTML = "";
      rankingGrafico.innerHTML = "";
      totalAssinaturasAdmin.textContent = registros.length.toLocaleString("pt-BR");
      totalEstados.textContent = ranking.length.toLocaleString("pt-BR");
      topEstado.textContent = ranking.length ? ranking[0][0] : "—";

      if (!ranking.length) {
        rankingLista.innerHTML = '<div class="empty-state">Ainda não há assinaturas suficientes para exibir o ranking.</div>';
        rankingGrafico.innerHTML = '<div class="empty-state">O gráfico aparecerá quando houver estados com assinaturas.</div>';
        return;
      }

      const maior = ranking[0][1];
      ranking.slice(0, 10).forEach(([estado, total], index) => {
        const medalhas = ["🥇", "🥈", "🥉"];
        const prefixo = medalhas[index] || `#${index + 1}`;

        const item = document.createElement("div");
        item.className = "ranking-item";
        item.innerHTML = `<strong>${prefixo} ${estado}</strong><span>${total} assinatura${total > 1 ? 's' : ''}</span>`;
        rankingLista.appendChild(item);

        const barra = document.createElement("div");
        barra.className = "chart-row";
        const largura = Math.max((total / maior) * 100, 8);
        barra.innerHTML = `
          <div class="chart-label">${estado}</div>
          <div class="chart-bar-wrap">
            <div class="chart-bar" style="width:${largura}%"></div>
          </div>
          <div class="chart-value">${total}</div>
        `;
        rankingGrafico.appendChild(barra);
      });
    }

    async function assinaturaExistentePorDispositivo(fingerprintHash) {
      const q = query(
        collection(db, "assinaturas"),
        where("fingerprintHash", "==", fingerprintHash),
        limit(1)
      );
      const snapshot = await getDocs(q);
      return !snapshot.empty;
    }

    async function assinar() {
      const nome = document.getElementById("nome").value.trim().replace(/\s+/g, " ");
      const estado = document.getElementById("estado").value;
      const cidade = document.getElementById("cidade").value.trim();
      const consentimento = document.getElementById("consentimento").checked;
      const submitBtn = document.getElementById("submitBtn");

      if (!validarNomeCompleto(nome)) {
        alert("Informe nome e sobrenome para assinar o abaixo-assinado.");
        return;
      }

      if (!estado || !cidade) {
        alert("Preencha estado e cidade.");
        return;
      }

      if (!cidadesDoEstado.includes(cidade)) {
        alert("Selecione uma cidade válida da lista do estado escolhido.");
        return;
      }

      if (!consentimento) {
        alert("Confirme o consentimento para concluir a assinatura.");
        return;
      }

      if (localStorage.getItem("assinaturaRegistrada") === "true") {
        alert("Este dispositivo já possui uma assinatura registrada.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      try {
        const fingerprintHash = await gerarFingerprint();
        const jaExiste = await assinaturaExistentePorDispositivo(fingerprintHash);

        if (jaExiste || localStorage.getItem("assinaturaRegistrada") === "true") {
          localStorage.setItem("assinaturaRegistrada", "true");
          alert("Este dispositivo já possui uma assinatura registrada.");
          return;
        }

        if (jaExiste) {
          localStorage.setItem("assinaturaRegistrada", "true");
          alert("Este dispositivo já possui uma assinatura registrada.");
          return;
        }

        await addDoc(collection(db, "assinaturas"), {
          nome,
          estado,
          cidade,
          fingerprintHash,
          createdAt: serverTimestamp(),
          consentimento: true,
          origem: "site"
        });

        localStorage.setItem("assinaturaRegistrada", "true");
        document.getElementById("nome").value = "";
        document.getElementById("estado").value = "";
        document.getElementById("cidade").value = "";
        document.getElementById("cidade").disabled = true;
        document.getElementById("cidade").placeholder = "Selecione primeiro o estado";
        document.getElementById("cidadeSugestoes").innerHTML = "";
        document.getElementById("cidadeSugestoes").style.display = "none";
        document.getElementById("consentimento").checked = false;
        cidadesDoEstado = [];
        criarEfeitoAssinatura();
        mostrarMensagemSucesso();
      } catch (error) {
        console.error(error);
        alert("Não foi possível registrar a assinatura agora. Tente novamente.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Assinar agora";
      }
    }

    function mostrarMensagemSucesso() {
      const msg = document.createElement("div");
      msg.className = "success-popup";
      msg.innerHTML = "💜 Assinatura confirmada! Obrigado por fortalecer o projeto.";
      document.body.appendChild(msg);

      setTimeout(() => msg.classList.add("show"), 50);
      setTimeout(() => {
        msg.classList.remove("show");
        setTimeout(() => msg.remove(), 400);
      }, 2600);
    }

    async function compartilhar() {
      const url = window.location.href;
      try {
        if (navigator.share) {
          await navigator.share({
            title: "Novas Datas — BTS WORLD TOUR 'ARIRANG' 💜",
            text: "Assine a campanha por novas datas da turnê ARIRANG no Brasil.",
            url
          });
        } else if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(url);
          alert("Link copiado!");
        } else {
          prompt("Copie o link abaixo:", url);
        }
      } catch (error) {
        console.error(error);
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(url);
            alert("Link copiado!");
          } else {
            prompt("Copie o link abaixo:", url);
          }
        } catch (fallbackError) {
          console.error(fallbackError);
          prompt("Copie o link abaixo:", url);
        }
      }
    }

    async function loginAdmin() {
      const email = document.getElementById("adminEmail").value.trim();
      const senha = document.getElementById("adminSenha").value;
      const loginBtn = document.getElementById("adminLoginBtn");

      if (!email || !senha) {
        alert("Preencha e-mail e senha do admin.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Entrando...";

      try {
        await signInWithEmailAndPassword(auth, email, senha);
        fecharModal("adminLoginModal");
        document.getElementById("adminEmail").value = "";
        document.getElementById("adminSenha").value = "";
      } catch (error) {
        console.error(error);
        alert("Não foi possível entrar no admin.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Entrar no admin";
      }
    }

    async function sairAdmin() {
      try {
        await signOut(auth);
      } catch (error) {
        console.error(error);
      }
    }

    async function excluirAssinatura(id, nome) {
      const confirmar = confirm(`Deseja remover a assinatura de ${nome}?`);
      if (!confirmar) return;

      try {
        await deleteDoc(doc(db, "assinaturas", id));
        alert("Assinatura removida.");
      } catch (error) {
        console.error(error);
        alert("Não foi possível excluir agora.");
      }
    }

    function ligarAdmin() {
      document.getElementById("adminTrigger").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      if (adminUnsubscribe) adminUnsubscribe();

      const adminListaEl = document.getElementById("adminLista");
      const ref = collection(db, "assinaturas");

      adminUnsubscribe = onSnapshot(ref, snapshot => {
        const registros = snapshot.docs.map(registro => ({ id: registro.id, ...registro.data() }));

        registros.sort((a, b) => {
          const sa = a.createdAt?.seconds || 0;
          const sb = b.createdAt?.seconds || 0;
          return sb - sa;
        });

        adminListaEl.innerHTML = "";
        registros.forEach((registro, index) => {
          const item = document.createElement("div");
          item.className = "admin-item";
          const nomeSeguro = (registro.nome || "Sem nome").replace(/'/g, "\\'");
          item.innerHTML = `
            <span>#${index + 1}</span>
            <div class="admin-info">
              <strong>${registro.nome || "Sem nome"}</strong>
              <small>${registro.estado || ""} • ${registro.cidade || "Sem cidade"}</small>
            </div>
            <button class="delete-btn" onclick="excluirAssinatura('${registro.id}', '${nomeSeguro}')">Excluir</button>
          `;
          adminListaEl.appendChild(item);
        });

        renderizarRankingEstados(registros);
      }, error => {
        console.error(error);
        adminListaEl.innerHTML = '<div class="empty-state">Não foi possível carregar os resultados do admin.</div>';
      });
    }

    function desligarAdmin() {
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("adminTrigger").style.display = "block";
      fecharAdminMenu();
      if (adminUnsubscribe) {
        adminUnsubscribe();
        adminUnsubscribe = null;
      }
    }

    function iniciarContador() {
      const contadorEl = document.getElementById("contador");
      const progressoEl = document.getElementById("progresso");
      const ref = collection(db, "assinaturas");

      onSnapshot(ref, snapshot => {
        const total = snapshot.size;
        contadorEl.textContent = total.toLocaleString("pt-BR");
        const porcentagem = Math.min((total / META) * 100, 100);
        progressoEl.style.width = porcentagem + "%";
      }, error => console.error(error));
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await prepararAuth();
      popularEstados();
      iniciarContador();

      const submitBtn = document.getElementById("submitBtn");
      const shareBtn = document.getElementById("shareBtn");
      const openAdminBtn = document.getElementById("openAdminBtn");

      submitBtn.addEventListener("click", assinar);
      shareBtn.addEventListener("click", compartilhar);
      openAdminBtn.addEventListener("click", () => abrirModal("adminLoginModal"));
      submitBtn.onclick = assinar;
      shareBtn.onclick = compartilhar;
      openAdminBtn.onclick = () => abrirModal("adminLoginModal");

      document.getElementById("adminLoginBtn").addEventListener("click", loginAdmin);
      document.getElementById("adminLogoutBtn").addEventListener("click", sairAdmin);
      document.getElementById("adminMenuBtn").addEventListener("click", abrirAdminMenu);
      document.getElementById("adminMenuCloseBtn").addEventListener("click", fecharAdminMenu);
      document.getElementById("adminBackdrop").addEventListener("click", fecharAdminMenu);
      document.getElementById("estado").addEventListener("change", (e) => carregarCidadesPorEstado(e.target.value));
      document.getElementById("cidade").addEventListener("input", (e) => filtrarCidades(e.target.value));
      document.getElementById("cidade").addEventListener("focus", mostrarSugestoesSePossivel);
      document.getElementById("cidade").addEventListener("blur", esconderSugestoesComDelay);

      document.querySelectorAll("[data-open-modal]").forEach(btn => {
        btn.addEventListener("click", () => abrirModal(btn.dataset.openModal));
      });

      document.querySelectorAll("[data-admin-tab]").forEach(btn => {
        btn.addEventListener("click", () => mostrarAdminAba(btn.dataset.adminTab));
      });

      mostrarAdminAba("adminAssinaturasTab");
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        ligarAdmin();
      } else {
        desligarAdmin();
      }
    });

    window.abrirModal = abrirModal;
    window.fecharModal = fecharModal;
    window.excluirAssinatura = excluirAssinatura;
    window.compartilhar = compartilhar;
    window.assinar = assinar;
    window.abrirAdminMenu = abrirAdminMenu;
    window.fecharAdminMenu = fecharAdminMenu;
    window.mostrarAdminAba = mostrarAdminAba;

    * { box-sizing: border-box; }

      --bg2: #4b0082;
      --bg3: #8a2be2;
      --glass: rgba(255,255,255,0.09);
      --glass-border: rgba(255,255,255,0.16);
      --text-soft: rgba(255,255,255,0.84);
      --shadow: 0 24px 70px rgba(0,0,0,0.28);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      overflow-x: hidden;
      position: relative;
      transition: background 0.45s ease, filter 0.45s ease;
    }

    body.signature-flash {
      background: radial-gradient(circle at center, rgba(218,130,255,0.35), transparent 35%), linear-gradient(135deg, #2a003b, #5a0da8 46%, #a548ff);
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .army-symbol {
      position: absolute;
      width: 18px;
      height: 34px;
      opacity: 0.28;
      animation: symbolWave 5s infinite ease-in-out;
      filter: drop-shadow(0 0 8px rgba(120,110,255,0.38)) drop-shadow(0 0 18px rgba(180,140,255,0.2));
      transition: filter .4s ease, opacity .4s ease;
    }

    .army-symbol::before,
    .army-symbol::after {
      content: "";
      position: absolute;
      top: 0;
      width: 7px;
      height: 100%;
      background: linear-gradient(180deg, #6f88ff, #b88cff);
      border-radius: 1px;
    }

    .army-symbol::before {
      left: 0;
      transform: skewY(12deg);
      transform-origin: top;
    }

    .army-symbol::after {
      right: 0;
      transform: skewY(-12deg);
      transform-origin: top;
    }

    @keyframes symbolWave {
      0% { transform: scale(1); opacity: 0.22; }
      15% { transform: scale(1.08); opacity: 0.38; }
      30% { transform: scale(0.95); opacity: 0.24; }
      45% { transform: scale(1.14); opacity: 0.52; }
      60% { transform: scale(0.96); opacity: 0.28; }
      75% { transform: scale(1.1); opacity: 0.42; }
      100% { transform: scale(1); opacity: 0.22; }
    }

    body.signature-wave .army-symbol {
      animation: symbolWaveStrong 1s ease-in-out 3;
    }

    @keyframes symbolWaveStrong {
      0% { transform: scale(1); opacity: 0.28; filter: drop-shadow(0 0 8px rgba(120,110,255,0.38)) drop-shadow(0 0 18px rgba(180,140,255,0.2)); }
      35% { transform: scale(1.36); opacity: 0.95; filter: drop-shadow(0 0 16px rgba(120,110,255,0.9)) drop-shadow(0 0 30px rgba(180,140,255,0.82)); }
      65% { transform: scale(0.94); opacity: 0.5; }
      100% { transform: scale(1); opacity: 0.28; }
    }

    .symbol1 { top: 8%; left: 8%; animation-delay: 0s; }
    .symbol2 { top: 18%; right: 11%; animation-delay: 0.9s; }
    .symbol3 { bottom: 12%; left: 13%; animation-delay: 1.8s; }
    .symbol4 { bottom: 20%; right: 9%; animation-delay: 2.7s; }
    .symbol5 { top: 42%; left: 49%; animation-delay: 3.6s; }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px 16px 22px;
    }

    .layout {
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }

    .card, .admin-panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 22px 22px 20px;
      animation: cardEnter .5s ease;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 12px;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.02;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.52;
      max-width: 760px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 15px;
      transition: transform .2s ease, background .2s ease;
    }

    .stat-box:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.1);
    }

    .stat-box span {
      display: block;
      font-size: 12px;
      opacity: 0.82;
      margin-bottom: 6px;
    }

    .stat-box strong {
      font-size: 24px;
      display: block;
    }

    .barra {
      height: 12px;
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 10px;
    }

    .progresso {
      height: 100%;
      width: 0%;
      transition: width .6s ease;
      background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(255,223,255,0.95));
      box-shadow: 0 0 18px rgba(255,255,255,0.62);
    }

    .meta-text {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 18px;
    }

    .form-wrap {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 18px;
      position: relative;
      overflow: visible;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.7fr 1fr;
      gap: 12px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label {
      font-size: 13px;
      opacity: 0.9;
    }

    input, select {
      width: 100%;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.94);
      color: #2d1740;
      font-size: 15px;
      outline: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .2s ease;
    }

    input:focus, select:focus {
      border-color: rgba(200,111,255,0.55);
      box-shadow: 0 0 0 4px rgba(200,111,255,0.12);
      transform: translateY(-1px);
    }

    select {
      appearance: auto;
      -webkit-appearance: menulist;
      -moz-appearance: menulist;
      cursor: pointer;
      pointer-events: auto;
    }

    input::placeholder { color: #735c8a; }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.78);
      margin-top: 10px;
      line-height: 1.5;
    }

    .cidade-search-wrap::after {
      content: "▼";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: rgba(45,23,64,0.7);
      pointer-events: none;
